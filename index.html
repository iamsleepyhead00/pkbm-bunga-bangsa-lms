<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PKBM Bunga Bangsa - LMS</title>
  <style>body{display:flex;align-items:center;justify-content:center;height:100vh;font-family:system-ui;background:#f8fafc;color:#475569;}</style>
</head>
<body>
  <p>Memuat...</p>
  <script>
    var SESSION_KEY = 'pkbm_lms_session';
    try {
      var data = localStorage.getItem(SESSION_KEY);
      if (data) {
        var session = JSON.parse(data);
        var now = Date.now();
        var last = new Date(session.lastActivity).getTime();
        if (now - last < 3600000) {
          session.lastActivity = new Date().toISOString();
          localStorage.setItem(SESSION_KEY, JSON.stringify(session));
          if (session.role === 'GURU') { window.location.replace('./pages/guru/dashboard.html'); }
          else if (session.role === 'SISWA') { window.location.replace('./pages/siswa/dashboard.html'); }
          else if (session.role === 'ADMIN') { window.location.replace('./pages/admin/dashboard.html'); }
          else { window.location.replace('./login.html'); }
        } else { localStorage.removeItem(SESSION_KEY); window.location.replace('./login.html'); }
      } else { window.location.replace('./login.html'); }
    } catch(e) { window.location.replace('./login.html'); }
  </script>
</body>
</html>
