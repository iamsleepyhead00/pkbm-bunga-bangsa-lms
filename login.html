  <div class="login-card-wrapper">
    <!-- Logo & Title -->
    <div class="login-logo-area">
      <div class="login-logo-icon">
        <img src="/assets/logo.png" alt="PKBM Bunga Bangsa">
      </div>
      <h1 class="login-title">PKBM Bunga Bangsa</h1>
      <p class="login-subtitle">Kabupaten Gunung Mas ● Kalimantan Tengah</p>
    </div>

    <!-- Login Card -->
    <div class="login-card">
      <div class="login-card-header">
        <i class="ri-shield-keyhole-line"></i>
        <div>
          <h2>Selamat Datang</h2>
          <p>Aplikasi Sistem Manajemen PKBM</p>
        </div>
      </div>

      <form id="loginForm" action="javascript:void(0)" novalidate>
        <div class="form-group">
          <label>Username</label>
          <div class="input-icon">
            <i class="ri-user-line"></i>
            <input type="text" id="username" placeholder="Masukkan username" autocomplete="username">
          </div>
        </div>

        <div class="form-group">
          <label>Password</label>
          <div class="input-icon">
            <i class="ri-lock-line"></i>
            <input type="password" id="password" placeholder="Masukkan password" autocomplete="current-password">
            <button type="button" class="eye-btn" id="eyeBtn"><i class="ri-eye-line" id="eyeIcon"></i></button>
          </div>
        </div>

        <div id="loginError" class="login-error" style="display:none;">
          <i class="ri-error-warning-line"></i>
          <span id="loginErrorText">Username atau password salah</span>
        </div>

        <button type="submit" id="loginBtn" class="btn btn-primary btn-full btn-login" onclick="handleLoginClick()">
          <i class="ri-login-box-line"></i> Masuk
        </button>
      </form>

      <!-- Theme toggle -->
      <button type="button" class="login-theme-btn" id="themeToggle">
        <i class="ri-moon-line" id="themeIcon"></i>
      </button>
    </div>

    <!-- Footer -->
    <p class="login-footer"><i class="ri-heart-line"></i> <span id="yearFooter"></span> PKBM Bunga Bangsa</p>
  </div>

  <!-- Non-module script for login — guaranteed to work -->
  <script>
    // Global click handler as fallback
    function handleLoginClick() {
      var errorEl = document.getElementById('loginError');
      var errorText = document.getElementById('loginErrorText');
      var username = document.getElementById('username').value.trim();
      var password = document.getElementById('password').value;
      if (!username || !password) {
        errorEl.style.display = 'flex';
        errorText.textContent = 'Username atau password salah';
      }
    }

    // Year
    document.getElementById('yearFooter').textContent = new Date().getFullYear();

    // Theme
    document.getElementById('themeToggle').addEventListener('click', function() {
      document.documentElement.classList.toggle('dark');
      var isDark = document.documentElement.classList.contains('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      document.getElementById('themeIcon').className = isDark ? 'ri-sun-line' : 'ri-moon-line';
    });

    // Eye toggle
    document.getElementById('eyeBtn').addEventListener('click', function() {
      var pw = document.getElementById('password');
      var icon = document.getElementById('eyeIcon');
      pw.type = pw.type === 'password' ? 'text' : 'password';
      icon.style.transform = 'scale(0) rotate(-90deg)';
      setTimeout(function() {
        icon.className = pw.type === 'text' ? 'ri-eye-off-line' : 'ri-eye-line';
        icon.style.transform = 'scale(1) rotate(0deg)';
      }, 150);
    });

    // Login form
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      var errorEl = document.getElementById('loginError');
      var errorText = document.getElementById('loginErrorText');
      var loginBtn = document.getElementById('loginBtn');
      var username = document.getElementById('username').value.trim();
      var password = document.getElementById('password').value;

      errorEl.style.display = 'none';

      if (!username || !password) {
        errorEl.style.display = 'flex';
        errorText.textContent = 'Username atau password salah';
        return;
      }

      // Try to login via Auth module (loaded async)
      loginBtn.disabled = true;
      loginBtn.innerHTML = '<i class="ri-loader-4-line ri-spin"></i> Memproses...';

      // Use dynamic import for Auth
      import('./js/auth.js').then(function(mod) {
        var Auth = mod.default;
        return Auth.login(username, password);
      }).then(function(result) {
        if (result && result.success) {
          var map = { GURU: '/pages/guru/dashboard.html', SISWA: '/pages/siswa/dashboard.html', ADMIN: '/pages/admin/dashboard.html' };
          window.location.href = map[result.user.role] || '/login.html';
        } else {
          errorEl.style.display = 'flex';
          errorText.textContent = 'Username atau password salah';
        }
      }).catch(function(err) {
        console.error('Login error:', err);
        errorEl.style.display = 'flex';
        errorText.textContent = 'Username atau password salah';
      }).finally(function() {
        loginBtn.disabled = false;
        loginBtn.innerHTML = '<i class="ri-login-box-line"></i> Masuk';
      });
    });

    // Seed data on first load
    if (!localStorage.getItem('pkbm_users') || JSON.parse(localStorage.getItem('pkbm_users') || '[]').length === 0) {
      import('./seed-data.js').catch(function() {});
    }

    // Check session
    import('./js/auth.js').then(function(mod) {
      var Auth = mod.default;
      var session = Auth.checkSession();
      if (session) {
        var map = { GURU: '/pages/guru/dashboard.html', SISWA: '/pages/siswa/dashboard.html', ADMIN: '/pages/admin/dashboard.html' };
        window.location.href = map[session.role] || '/login.html';
      }
    }).catch(function() {});
  </script>
